name: Build LemonSqueezy Activate Server

on:
  push:
  pull_request:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lemonsqueezy_activate_server-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/lemonsqueezy_activate_server
          if-no-files-found: error
